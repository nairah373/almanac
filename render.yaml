# Render blueprint for Almanac.
# Lets Render auto-configure the web service from this repo.
# Secrets are marked `sync: false` so Render asks you to fill them in
# the dashboard rather than reading from this file.

services:
  - type: web
    name: almanac
    runtime: node
    plan: free
    region: singapore
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "22"

      # ── Supabase ─────────────────────────────────────────────
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

      # ── Database (Supabase Postgres) ────────────────────────
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false

      # ── App URL — set this to your Render URL after first deploy ──
      - key: NEXT_PUBLIC_SITE_URL
        sync: false

      # ── Razorpay (placeholders — fill in when you set up payments) ──
      - key: RAZORPAY_KEY_ID
        value: rzp_test_placeholder
      - key: RAZORPAY_KEY_SECRET
        value: placeholder
      - key: RAZORPAY_WEBHOOK_SECRET
        value: placeholder
      - key: NEXT_PUBLIC_RAZORPAY_KEY_ID
        value: rzp_test_placeholder
